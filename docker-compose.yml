version: "3.8"

services:

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - ecommerce-network

  order-db:
    image: postgres:16
    container_name: order-db
    environment:
      POSTGRES_DB: orderDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5433:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  inventory-db:
    image: postgres:16
    container_name: inventory-db
    environment:
      POSTGRES_DB: inventoryDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5434:5432"
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  discovery-service:
    image: discovery-service:latest
    container_name: discovery-service
    ports:
      - "8761:8761"
    networks:
      - ecommerce-network

  config-server:
    image: config-server:latest
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      - discovery-service
    networks:
      - ecommerce-network

  inventory-service:
    image: inventory-service:latest
    container_name: inventory-service
    ports:
      - "8082:8082"
    depends_on:
      - config-server
      - zipkin
      - inventory-db
      - discovery-service
    networks:
      - ecommerce-network

  order-service:
    image: order-service:latest
    container_name: order-service
    ports:
      - "8083:8083"
    depends_on:
      - config-server
      - zipkin
      - order-db
      - inventory-service
      - discovery-service
    networks:
      - ecommerce-network

  api-gateway:
    image: api-gateway:latest
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - order-service
      - inventory-service
      - config-server
      - discovery-service
    networks:
      - ecommerce-network

volumes:
  order-db-data:
  inventory-db-data:

networks:
  ecommerce-network: