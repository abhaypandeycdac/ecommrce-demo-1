apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server

spec:
  replicas: 1

  selector:
    matchLabels:
      app: config-server

  template:
    metadata:
      labels:
        app: config-server

    spec:
      containers:
        - name: config-server
          image: abhay721/ecommerce-config-server

          ports:
            - containerPort: 8888

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s

            # GitHub Config Repo Username
            - name: GIT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: GIT_USERNAME

            # GitHub PAT Token
            - name: GIT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: my-secret
                  key: GIT_PASSWORD

          resources:
            limits:
              memory: "400Mi"
              cpu: "200m"

            requests:
              memory: "200Mi"
              cpu: "100m"

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 5

---

apiVersion: v1
kind: Service

metadata:
  name: config-server

spec:
  selector:
    app: config-server

  ports:
    - port: 8888
      targetPort: 8888