apiVersion: apps/v1
kind: Deployment

metadata:
  name: inventory-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: inventory-service

  template:
    metadata:
      labels:
        app: inventory-service

    spec:
      containers:
      - name: inventory-service
        image: abhay721/ecommerce-inventory-service

        resources:
          limits:
            memory: "400Mi"
            cpu: "200m"

          requests:
            memory: "200Mi"
            cpu: "100m"

        env:
          - name: SPRING_PROFILES_ACTIVE
            value: k8s

          - name: DB_USER
            # value: postgres                # hardcoded value -- replaced with Secret
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: INVENTORY_DB_USER

          - name: DB_PASSWORD
            # value: postgres123             # hardcoded value -- replaced with Secret
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: INVENTORY_DB_PASSWORD

          - name: DB_SERVICE
            value: inventory-db-service      # service name -- not a secret, kept as-is

        ports:
        - containerPort: 8082

---

apiVersion: v1
kind: Service

metadata:
  name: inventory-service

spec:
  selector:
    app: inventory-service

  ports:
  - port: 80
    targetPort: 8082

  type: ClusterIP