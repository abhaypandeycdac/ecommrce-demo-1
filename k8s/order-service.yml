apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      initContainers:
      - name: wait-for-config-server
        image: busybox
        command: ['sh', '-c',
          'until wget -q http://config-server:8888/actuator/health;
          do echo "Waiting for config-server..."; sleep 5; done']
      - name: wait-for-order-db
        image: busybox
        command: ['sh', '-c',
          'until nc -z order-db-service 5432;
          do echo "Waiting for order-db..."; sleep 5; done']

      containers:
      - name: order-service
        image: abhay721/ecommerce-order-service
        resources:
          limits:
            memory: "400Mi"
            cpu: "200m"
          requests:
            memory: "200Mi"
            cpu: "100m"
        env:
          - name: SPRING_PROFILES_ACTIVE
            value: k8s

          - name: DB_USER
            # value: user                    # hardcoded value -- replaced with Secret
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: ORDER_DB_USER

          - name: DB_PASSWORD
            # value: password                # hardcoded value -- replaced with Secret
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: ORDER_DB_PASSWORD

          - name: DB_SERVICE
            value: order-db-service          # service name -- not a secret, kept as-is

        ports:
        - containerPort: 8081
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 20
          timeoutSeconds: 20
          failureThreshold: 5

---

apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
  - port: 80
    targetPort: 8081
  type: ClusterIP